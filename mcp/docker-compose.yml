version: "3.8"
services:
  mcp-server:
    build:
      context: ..
      dockerfile: mcp/Dockerfile
    image: now-micro/actions-mcp:dev
    container_name: actions-mcp-server
    restart: unless-stopped
    # MCP is stdio-based; no ports needed by default. Keep for future.
    # ports:
    #   - "3000:3000"
    working_dir: /app
    stdin_open: true
    tty: true
