name: 'Authorize'
description: >
  Checks whether the workflow actor is permitted to run the calling workflow,
  based on a central permissions.json policy file. Exits with code 1 and a
  descriptive message when the actor is not authorized.
author: 'Now-Micro'

inputs:
  debug-mode:
    description: 'Enable debug mode for additional logging.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: Now-Micro/actions/setup-node@v1

    - name: Check authorization
      id: authorize
      shell: bash
      run: node "$GITHUB_ACTION_PATH/authorize.js"
      env:
        INPUT_ACTOR: ${{ github.actor }}
        INPUT_DEBUG_MODE: ${{ inputs.debug-mode }}
        INPUT_REPOSITORY: ${{ github.repository }}
        INPUT_WORKFLOW_REF: ${{ github.workflow_ref }}
