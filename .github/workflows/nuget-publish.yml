name: Nuget Package

permissions:
    contents: write
    packages: write

on:
    push:
        branches: [release/**]
    workflow_call:
        inputs:
            artifact-retention-days:
                description: "Artifact retention period in days."
                required: false
                type: string
            ci-debug-mode:
                description: "Debug mode for project discovery and publish steps."
                required: false
                type: string
            ignore-casing:
                description: "Ignore casing when parsing release refs and matching package names."
                required: false
                type: string
            package:
                description: "Package name to release."
                required: false
                type: string
            package-directory:
                description: "Directory to store generated package artifacts."
                required: false
                type: string
            ref-name:
                description: "Ref name to use when package/version are not provided."
                required: false
                type: string
            release-dotnet-version:
                description: "The .NET version used for publishing."
                required: false
                type: string
            release-workflow-debug-mode:
                description: "Debug mode for release validation and release publishing."
                required: false
                type: string
            tests-directory:
                description: "Directory to search for the test project; leave empty to skip test discovery."
                required: false
                type: string
            version:
                description: "Version to package."
                required: false
                type: string
        secrets:
            token-github-packages:
                description: "PAT used to authenticate to GitHub Packages."
                required: true

jobs:
    nuget-publish:
        runs-on: ubuntu-22.04
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run shared nuget publish workflow
              uses: ./.github/actions/nuget-publish-workflow
              with:
                  artifact-retention-days: ${{ inputs['artifact-retention-days'] != '' && inputs['artifact-retention-days'] || '1' }}
                  ci-debug-mode: ${{ inputs['ci-debug-mode'] != '' && inputs['ci-debug-mode'] || 'false' }}
                  cleanup-release: "false"
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  ignore-casing: ${{ inputs['ignore-casing'] != '' && inputs['ignore-casing'] || 'true' }}
                  package: ${{ inputs.package }}
                  package-directory: ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}
                  ref-name: ${{ inputs['ref-name'] != '' && inputs['ref-name'] || github.ref_name }}
                  release-dotnet-version: ${{ inputs['release-dotnet-version'] != '' && inputs['release-dotnet-version'] || '10.0.x' }}
                  release-workflow-debug-mode: ${{ inputs['release-workflow-debug-mode'] != '' && inputs['release-workflow-debug-mode'] || 'true' }}
                  tests-directory: ${{ inputs['tests-directory'] }}
                  token-github-packages: ${{ github.event_name == 'push' && secrets.TOKEN_GITHUB_PACKAGES || secrets['token-github-packages'] }}
                  version: ${{ inputs.version }}
