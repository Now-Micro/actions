name: Demo - Nuget Publish

on:
  workflow_dispatch:
    inputs:
      artifact-retention-days:
        description: "Artifact retention period in days."
        required: false
        type: string
        default: "1"
      ci-debug-mode:
        description: "Debug mode for project discovery and publish steps."
        required: false
        type: string
        default: "true"
      cleanup-release:
        description: "Whether to delete the created GitHub release and tag during cleanup."
        required: false
        type: string
        default: "true"
      ignore-casing:
        description: "Ignore casing when parsing release refs and matching package names."
        required: false
        type: string
        default: "true"
      package:
        description: "Package name to release."
        required: false
        type: choice
        default: "Api"
        options:
          - Api
          - AppA
          - AppB
          - CodingStandards.Analyzers
          - Demo.Linting
          - Service
          - Trafera.Messaging.Abstractions
          - Trafera.Messaging.MassTransit
          - Trafera.Messaging.MediatR
      package-directory:
        description: "Directory to store generated package artifacts."
        required: false
        type: string
        default: "nupkgs"
      ref-name:
        description: "Ref name to use when package/version are not provided."
        required: false
        type: string
        default: ""
      release-dotnet-version:
        description: "The .NET version(s) used for publishing.  Separate version with a comma for multiple versions."
        required: false
        type: string
        default: ""
      release-workflow-debug-mode:
        description: "Debug mode for release validation and release publishing."
        required: false
        type: string
        default: "true"
      tests-directory:
        description: "Directory to search for the test project; leave empty to skip test discovery."
        required: false
        type: string
        default: "src/demo/dotnet/tests/Api.Tests"
      version:
        description: "Version to package. If empty a unique run id will be used."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  demo-nuget-publish:
    name: NuGet Publish
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run demo nuget publish workflow composite
        uses: ./.github/actions/nuget-publish-workflow
        with:
          artifact-retention-days: ${{ inputs['artifact-retention-days'] }}
          ci-debug-mode: ${{ inputs['ci-debug-mode'] }}
          cleanup-release: ${{ inputs['cleanup-release'] }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ignore-casing: ${{ inputs['ignore-casing'] }}
          package-directory: ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}
          package: ${{ inputs.package }}
          ref-name: ${{ inputs['ref-name'] != '' && inputs['ref-name'] || github.ref_name }}
          release-dotnet-version: ${{ inputs['release-dotnet-version'] != '' && inputs['release-dotnet-version'] || '8.0.x, 10.0.x' }}
          release-workflow-debug-mode: ${{ inputs['release-workflow-debug-mode'] }}
          tests-directory: ${{ inputs['tests-directory'] }}
          token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}
          version: "${{ inputs.version != '' && inputs.version || format('0.0.0-{0}', github.run_id) }}"
