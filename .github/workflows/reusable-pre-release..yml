name: Pre-Release NuGet Package

permissions:
    contents: write
    packages: write

on:
    workflow_dispatch:
        inputs:
            artifact-retention-days:
                description: "Artifact retention period in days."
                required: false
                type: string
                default: "1"
            base-ref:
                description: "Base ref to compare changes against for determining which packages
                    to publish."
                required: true
                type: string
            ci-debug-mode:
                description: "Debug mode for project discovery and publish steps."
                required: false
                type: string
                default: "false"
            dotnet-version:
                description: "The versions of .NET to install before running this workflow.
                    Should be a comma-separated list of versions (e.g. '8.0.x,10.0.x')."
                required: false
                type: string
                default: "8.0.x"
            nuget-package-dir:
                description: "Directory to store generated package artifacts."
                required: false
                type: string
                default: "nupkgs"
            nuget-pattern-to-match:
                description: "Glob pattern to match for determining which changed files should
                    trigger a package publish. Should include a capture group for the project
                    directory (e.g. '^(.*\/src)\/.*\\.(cs|csproj|sln)$')."
                required: false
                type: string
                default: "^(.*\/src)\/.*\\.(cs|csproj|sln)$"
            nuget-project-regex:
                description: "Regex pattern to extract project name from the .csproj file path. Should
                    include a capture group for the project name (e.g. '.*\\.csproj$')."
                required: false
                type: string
                default: ".*\\.csproj$"
            nuget-urls:
                description: "Nuget feed URLs to publish to, separated by commas."
                required: false
                type: string
            prerelease-identifier:
                description: "Pre-release identifier (alpha, beta, preview, rc)"
                required: false
                type: string
                default: "beta"
            version-increment-type:
                description: "Version increment type (major, minor, patch, or none)"
                required: false
                type: string
                default: "none"
    workflow_call:
        inputs:
            artifact-retention-days:
                description: "Artifact retention period in days."
                required: false
                type: string
                default: "1"
            base-ref:
                description: "Base ref to compare changes against for determining which packages
                    to publish."
                required: true
                type: string
            ci-debug-mode:
                description: "Debug mode for project discovery and publish steps."
                required: false
                type: string
                default: "false"
            dotnet-version:
                description: "The versions of .NET to install before running this workflow.
                    Should be a comma-separated list of versions (e.g. '8.0.x,10.0.x')."
                required: false
                type: string
                default: "8.0.x"
            nuget-package-dir:
                description: "Directory to store generated package artifacts."
                required: false
                type: string
                default: "nupkgs"
            nuget-pattern-to-match:
                description: "Glob pattern to match for determining which changed files should
                    trigger a package publish. Should include a capture group for the project
                    directory (e.g. '^(.*\/src)\/.*\\.(cs|csproj|sln)$')."
                required: false
                type: string
                default: "^(.*\/src)\/.*\\.(cs|csproj|sln)$"
            nuget-project-regex:
                description: "Regex pattern to extract project name from the .csproj file path. Should
                    include a capture group for the project name (e.g. '.*\\.csproj$')."
                required: false
                type: string
                default: ".*\\.csproj$"
            nuget-urls:
                description: "Nuget feed URLs to publish to, separated by commas."
                required: false
                type: string
            prerelease-identifier:
                description: "Pre-release identifier (alpha, beta, preview, rc)"
                required: false
                type: string
                default: "beta"
            version-increment-type:
                description: "Version increment type (major, minor, patch, or none)"
                required: false
                type: string
                default: "none"
        secrets:
            github-token:
                description: "GitHub token with permissions to read from the repository and publish packages."
                required: true
            token-github-packages:
                description: "PAT used to authenticate to GitHub Packages."
                required: true

jobs:
    nuget-publish:
        runs-on: ubuntu-22.04
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Validate inputs
              shell: bash
              run: |
                  valid_identifiers="alpha beta preview rc"
                  valid_increments="major minor patch none"

                  base_ref="${{ inputs['base-ref'] }}"
                  identifier="${{ inputs['prerelease-identifier'] }}"
                  increment="${{ inputs['version-increment-type'] }}"

                  if [[ -z "$base_ref" ]]; then
                    echo "❌ base-ref is required. Pass the ref to compare changed files against (e.g. \${{ github.event.repository.default_branch }} is the safest approach)."
                    exit 1
                  fi

                  if [[ ! " $valid_identifiers " =~ " $identifier " ]]; then
                    echo "❌ Invalid prerelease-identifier: '$identifier'. Must be one of: $valid_identifiers"
                    exit 1
                  fi

                  if [[ ! " $valid_increments " =~ " $increment " ]]; then
                    echo "❌ Invalid version-increment-type: '$increment'. Must be one of: $valid_increments"
                    exit 1
                  fi

            - name: Run shared nuget publish workflow
              uses: ./.github/actions/reusable-pre-release
              #   TODO: Uncomment this when done
              #   uses: Now-Micro/actions/.github/actions/reusable-pre-release@v1
              with:
                  artifact-retention-days: ${{ inputs['artifact-retention-days'] != '' &&
                      inputs['artifact-retention-days'] || '1' }}
                    base-ref: ${{ inputs['base-ref'] }}
                  ci-debug-mode: ${{ inputs['ci-debug-mode'] != '' && inputs['ci-debug-mode'] ||
                      'false' }}
                  cleanup-release: "false"
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  ignore-casing: ${{ inputs['ignore-casing'] != '' && inputs['ignore-casing'] ||
                      'true' }}
                  nuget-urls: ${{ inputs['nuget-urls'] }}
                  package: ${{ inputs.package }}
                  package-directory: ${{ inputs['package-directory'] != '' &&
                      inputs['package-directory'] || 'nupkgs' }}
                  ref-name: ${{ inputs['ref-name'] != '' && inputs['ref-name'] || github.ref_name
                      }}
                  release-dotnet-version: ${{ inputs['release-dotnet-version'] != '' &&
                      inputs['release-dotnet-version'] || '10.0.x' }}
                  release-workflow-debug-mode: ${{ inputs['release-workflow-debug-mode'] != '' &&
                      inputs['release-workflow-debug-mode'] || 'true' }}
                  tests-directory: ${{ inputs['tests-directory'] }}
                  token-github-packages: ${{ github.event_name == 'push' &&
                      secrets.TOKEN_GITHUB_PACKAGES ||
                      secrets['token-github-packages'] }}
                  version: ${{ inputs.version }}
