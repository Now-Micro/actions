name: Pre-Release NuGet Package

permissions:
    contents: write
    packages: write

on:
    workflow_call:
        inputs:
            artifact-retention-days:
                description: "Artifact retention period in days."
                required: false
                type: string
                default: "1"
            base-ref:
                description: "Base ref to compare changes against for determining which packages
                    to publish.  If empty, the workflow will use the default branch of the repository as the base ref."
                required: false
                type: string
            ci-debug-mode:
                description: "Debug mode for project discovery and publish steps."
                required: false
                type: string
                default: "false"
            dotnet-version:
                description: "The versions of .NET to install before running this workflow.
                    Should be a comma-separated list of versions (e.g.
                    '8.0.x,10.0.x')."
                required: false
                type: string
                default: "8.0.x"
            nuget-package-dir:
                description: "Directory to store generated package artifacts."
                required: false
                type: string
                default: "nupkgs"
            nuget-pattern-to-match:
                description: "Glob pattern to match for determining which changed files should
                    trigger a package publish. Should include a capture group
                    for the project directory (e.g.
                    '^(.*/src)/.*\\.(cs|csproj|sln)$')."
                required: false
                type: string
                default: "^(.*/src)/.*\\.(cs|csproj|sln)$"
            nuget-project-regex:
                description: "Regex pattern to extract project name from the .csproj file path.
                    Should include a capture group for the project name (e.g.
                    '.*\\.csproj$')."
                required: false
                type: string
                default: ".*\\.csproj$"
            nuget-urls:
                description: "Nuget feed URLs to publish to, separated by commas."
                required: true
                type: string
                default: ""
            prerelease-identifier:
                description: "Pre-release identifier (alpha, beta, preview, rc)"
                required: false
                type: string
                default: "alpha"
            version-increment-type:
                description: "Version increment type (major, minor, patch, or none)"
                required: false
                type: string
                default: "none"
        secrets:
            github-token:
                description: "GitHub token with permissions to read from the repository and
                    publish packages."
                required: true
            token-github-packages:
                description: "PAT used to authenticate to GitHub Packages."
                required: true

jobs:
    detect-changed-libraries:
        runs-on: ubuntu-22.04
        outputs:
            changed_dirs: ${{ steps.unique-dirs.outputs.unique_project_directories }}
        steps:
          - name: Check out code
            uses: actions/checkout@v6
            with:
                fetch-depth: 0
  
          - name: Get Changed Files between branch and main
            id: get-changed-files
            uses: Now-Micro/actions/get-changed-files@v1
            with:
                head-ref: ${{ github.sha }}
                base-ref: ${{ inputs['base-ref'] || github.event.repository.default_branch }}
  
          - name: Get Unique Project Directories
            id: unique-dirs
            uses: Now-Micro/actions/get-unique-project-directories@v1
            with:
                paths: ${{ steps.get-changed-files.outputs.changed_files }}
                pattern: ${{ inputs['nuget-pattern-to-match'] }}
                debug-mode: ${{ inputs['ci-debug-mode'] }}
                fallback-regex: ${{ inputs['nuget-pattern-to-match'] }}
                use-original-if-missing: false

    nuget-publish:
        runs-on: ubuntu-22.04
        needs: [ detect-changed-libraries ]
        if: needs.detect-changed-libraries.outputs.changed_dirs != '[]'
        strategy:
          fail-fast: false
          matrix:
            directory: ${{ fromJson(needs.detect-changed-libraries.outputs.changed_dirs) }}
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Validate inputs
              shell: bash
              env:
                  NUGET_URLS: ${{ inputs['nuget-urls'] }}
                  GITHUB_TOKEN_INPUT: ${{ secrets['github-token'] }}
                  TOKEN_GITHUB_PACKAGES: ${{ secrets['token-github-packages'] }}
              run: |
                  valid_identifiers="alpha beta preview rc"
                  valid_increments="major minor patch none"

                  base_ref="${{ inputs['base-ref'] || github.event.repository.default_branch }}"
                  identifier="${{ inputs['prerelease-identifier'] }}"
                  increment="${{ inputs['version-increment-type'] }}"

                  if [[ -z "$NUGET_URLS" ]]; then
                    echo "❌ Required input 'nuget-urls' is empty."
                    exit 1
                  fi

                  if [[ -z "$GITHUB_TOKEN_INPUT" ]]; then
                    echo "❌ Required secret 'github-token' is empty."
                    exit 1
                  fi

                  if [[ -z "$TOKEN_GITHUB_PACKAGES" ]]; then
                    echo "❌ Required secret 'token-github-packages' is empty."
                    exit 1
                  fi

                  if [[ ! " $valid_identifiers " =~ " $identifier " ]]; then
                    echo "❌ Invalid prerelease-identifier: '$identifier'. Must be one of: $valid_identifiers"
                    exit 1
                  fi

                  if [[ ! " $valid_increments " =~ " $increment " ]]; then
                    echo "❌ Invalid version-increment-type: '$increment'. Must be one of: $valid_increments"
                    exit 1
                  fi

            - name: Run shared nuget publish workflow
              uses: ./.github/actions/reusable-pre-release-workflow
              #   TODO: Uncomment this when done
              #   uses: Now-Micro/actions/.github/actions/reusable-pre-release-workflow@v1
              with:
                  artifact-retention-days: ${{ inputs['artifact-retention-days'] }}
                  base-ref: ${{ inputs['base-ref'] || github.event.repository.default_branch }}
                  ci-debug-mode: ${{ inputs['ci-debug-mode'] }}
                  dotnet-version: ${{ inputs['dotnet-version'] }}
                  github-token: ${{ secrets['github-token'] }}
                  nuget-package-dir: ${{ inputs['nuget-package-dir'] }}
                  nuget-pattern-to-match: ${{ inputs['nuget-pattern-to-match'] }}
                  nuget-project-regex: ${{ inputs['nuget-project-regex'] }}
                  nuget-urls: ${{ inputs['nuget-urls'] }}
                  prerelease-identifier: ${{ inputs['prerelease-identifier'] }}
                  token-github-packages: ${{ secrets['token-github-packages'] }}
                  version-increment-type: ${{ inputs['version-increment-type'] }}
    
    summary:
        runs-on: ubuntu-22.04
        needs: [ detect-changed-libraries, nuget-publish ]
        if: needs.detect-changed-libraries.outputs.changed_dirs != '[]'
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Generate summary
              shell: bash
              run: |
                  echo "# Pre-Release Build Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Pre-release Identifier:** \`${{ inputs['prerelease-identifier'] || github.event.inputs.prerelease-identifier }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Base Ref:** \`${{ inputs['base-ref'] || github.event.repository.default_branch }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY  
                  if [ "${{ needs.detect-changed-libraries.outputs.changed_dirs }}" = "[]" ]; then
                  echo "ℹ️ **No libraries with changes detected between branch and main**" >> $GITHUB_STEP_SUMMARY
                  exit 0
                  fi  
                  echo "## 📦 Pre-release Packages Generated" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY  
                  if [ -d "prerelease-artifacts" ]; then
                  found_pkg=0
                  while read pkg; do
                      if [ -f "$pkg" ]; then
                      file_name="$(basename "$pkg")"
                      base_no_ext="${file_name%.nupkg}"
                      # Extract SemVer (with optional pre-release) from end of filename
                      version="$(echo "$base_no_ext" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9\.-]+)?$' || true)"
                      if [ -n "$version" ]; then
                          package_id="${base_no_ext%.$version}"
                      else
                          # Fallback: best-effort split at last dot
                          package_id="${base_no_ext%.*}"
                          version="${base_no_ext##*.}"
                      fi  
                      # List with link to GitHub Packages page
                      echo "- [\`$file_name\`](https://github.com/${{ github.repository }}/pkgs/nuget/$package_id)" >> $GITHUB_STEP_SUMMARY
                      # Add install command for this specific package/version
                      echo '  ```bash' >> $GITHUB_STEP_SUMMARY
                      echo "  dotnet add package $package_id --version $version --source github" >> $GITHUB_STEP_SUMMARY
                      echo '  ```' >> $GITHUB_STEP_SUMMARY
                      echo '' >> $GITHUB_STEP_SUMMARY
                      found_pkg=1
                      fi
                  done < <(find prerelease-artifacts -name "*.nupkg")
                  if [ "$found_pkg" -eq 0 ]; then
                      echo "No packages were generated." >> $GITHUB_STEP_SUMMARY
                  fi
                  else
                  echo "No packages were generated." >> $GITHUB_STEP_SUMMARY
                  fi  
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "## 📥 Installation" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Configure your NuGet source:" >> $GITHUB_STEP_SUMMARY
                  echo '```bash' >> $GITHUB_STEP_SUMMARY
                  echo 'dotnet nuget add source --username YOUR_USERNAME --password YOUR_PAT --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"' >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Then install packages using the commands listed above for each package." >> $GITHUB_STEP_SUMMARY
