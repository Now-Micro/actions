name: Demo - Shared Checks

on:
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read

jobs:
  resolve-base-ref:
    name: Resolve base ref
    runs-on: ubuntu-latest
    outputs:
      base_ref: ${{ steps.refs.outputs.base_ref }}
      head_ref: ${{ steps.refs.outputs.head_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve demo refs
        id: refs
        uses: ./.github/actions/demo-shared-checks

  shared-checks:
    name: Shared checks demo
    needs: resolve-base-ref
    uses: ./.github/workflows/shared-checks.yml
    with:
      base-ref: ${{ needs.resolve-base-ref.outputs.base_ref }}
      coding-standards-path-pattern: ".*"
      head-ref: ${{ needs.resolve-base-ref.outputs.head_ref }}
      nuget-names: "CodeBits"
      nuget-urls: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
      roslyn-analyzer-version: "latest"
      testing-path-pattern: ".*"
      test-project-regex: ".*Tests.*\\.csproj$"
      workflow-name: "demo-shared-checks.yml"
    secrets:
      token_github_packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}