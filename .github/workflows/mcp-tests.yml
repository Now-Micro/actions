name: MCP Server - Tests

on:
  push:
    branches: [ main, chore/add-mcp-server ]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-tests.yml'
  pull_request:
    branches: [ main, chore/add-mcp-server ]
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-tests.yml'
  workflow_dispatch: {}

concurrency:
  group: mcp-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-mcp:
    name: Run MCP tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json

      - name: Install deps (mcp)
        working-directory: mcp
        run: npm ci

      - name: Build & run tests (mcp)
        working-directory: mcp
        run: npm test
