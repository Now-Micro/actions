name: Demo - Checks Workflow

on:
    workflow_dispatch:

jobs:
    # ── Lint (via reusable workflow) ───────────────────────────────────────
    lint:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-linting: "true"
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Coding standards expected-failure cases (via composite) ───────────
    # Note: reusable workflow jobs do not support continue-on-error, so the
    # expected-failure cases are handled inside the composite action where
    # continue-on-error can be applied at the step level.
    coding-standards-expected-failures:
        runs-on: ubuntu-22.04
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run demo checks workflow composite
              uses: ./.github/actions/demo-checks-workflow

    # ── Coding standards (via reusable workflow) ───────────────────────────
    coding-standards-success:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-coding-standards: "true"
            directory: ./src/demo/coding-standards-success
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Tests (via reusable workflow) ──────────────────────────────────────
    test:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-testing: "true"
            directory: src/demo/dotnet
            dotnet-version: "8.0.x"
            test-project-regex: '.*Tests\.csproj\s*$'
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Coding standards – change detection (via reusable workflow) ────────
    # Injects a known demo file path so the change-detection path is exercised
    # end-to-end without depending on which files happened to change on this branch.
    coding-standards-change-detection:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-coding-standards: "true"
            coding-standards-path-pattern: "^(src/demo/coding-standards-success)/"
            overridden-changed-files: '["src/demo/coding-standards-success/src/Demo.Linting/Program.cs"]'
            ci-debug-mode: "true"
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Tests – change detection (via reusable workflow) ───────────────────
    # Same approach: inject a known demo file path so the change-detection path
    # detects src/demo/dotnet and runs tests there.
    # We inject the test project file directly so get-unique-project-directories
    # resolves to src/demo/dotnet/tests/Api.Tests (the transformer won't match
    # a tests/ path to a valid directory, so use-original-if-missing kicks in).
    test-change-detection:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-testing: "true"
            testing-path-pattern: "^(src/demo/dotnet)/.*\\.(cs|csproj|sln|slnx)$"
            use-original-if-missing: "true"
            overridden-changed-files: '["src/demo/dotnet/tests/Api.Tests/Api.Tests.csproj"]'
            dotnet-version: "8.0.x"
            test-project-regex: '.*Tests\.csproj\s*$'
            ci-debug-mode: "true"
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Calculate Still-Changed Files – logic unit tests ──────────────────
    # The still-changed-files intersection step in test-setup cannot be
    # exercised end-to-end in a demo (it requires real git history with a
    # last-success SHA). This job tests the bash/jq snippet directly with
    # fixture data, covering both branches:
    #   1. Fallback: AGAINST_MAIN is absent/empty → passthrough of SINCE_LAST
    #   2. Intersection: return only files present in both arrays
    test-still-changed-files-logic:
        runs-on: ubuntu-22.04
        steps:
            - name: Check out code
              uses: actions/checkout@v6

            - name: Prepare summary file
              id: pre
              shell: bash
              run: echo "summary_file=$(pwd)/still-changed-summary.txt" >> "$GITHUB_OUTPUT"

            # ── T1: AGAINST_MAIN is empty → passthrough ───────────────────
            - name: T1 - Empty AGAINST_MAIN
              id: t1
              shell: bash
              env:
                  SINCE_LAST: '["a.cs","b.cs"]'
                  AGAINST_MAIN: ""
              run: |
                  if [ -z "$AGAINST_MAIN" ] || [ "$AGAINST_MAIN" = "[]" ]; then
                    echo "changed_files=$SINCE_LAST" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  INTERSECTION=$(jq -nc --argjson since "$SINCE_LAST" --argjson main "$AGAINST_MAIN" \
                    '[$since[] | select(. as $x | $main | index($x) != null)]')
                  echo "changed_files=$INTERSECTION" >> "$GITHUB_OUTPUT"

            - name: Assert T1
              uses: ./src/testing/assert
              with:
                  test-name: "empty AGAINST_MAIN → passthrough of SINCE_LAST"
                  summary-file: ${{ steps.pre.outputs.summary_file }}
                  mode: exact
                  expected: '["a.cs","b.cs"]'
                  actual: ${{ steps.t1.outputs.changed_files }}

            # ── T2: AGAINST_MAIN is "[]" → passthrough ────────────────────
            - name: T2 - Empty-array AGAINST_MAIN
              id: t2
              shell: bash
              env:
                  SINCE_LAST: '["a.cs","b.cs"]'
                  AGAINST_MAIN: "[]"
              run: |
                  if [ -z "$AGAINST_MAIN" ] || [ "$AGAINST_MAIN" = "[]" ]; then
                    echo "changed_files=$SINCE_LAST" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  INTERSECTION=$(jq -nc --argjson since "$SINCE_LAST" --argjson main "$AGAINST_MAIN" \
                    '[$since[] | select(. as $x | $main | index($x) != null)]')
                  echo "changed_files=$INTERSECTION" >> "$GITHUB_OUTPUT"

            - name: Assert T2
              uses: ./src/testing/assert
              with:
                  test-name: "empty-array AGAINST_MAIN → passthrough of SINCE_LAST"
                  summary-file: ${{ steps.pre.outputs.summary_file }}
                  mode: exact
                  expected: '["a.cs","b.cs"]'
                  actual: ${{ steps.t2.outputs.changed_files }}

            # ── T3: Partial overlap → intersection only ───────────────────
            - name: T3 - Partial overlap
              id: t3
              shell: bash
              env:
                  SINCE_LAST: '["a.cs","b.cs","c.cs"]'
                  AGAINST_MAIN: '["b.cs","c.cs","d.cs"]'
              run: |
                  if [ -z "$AGAINST_MAIN" ] || [ "$AGAINST_MAIN" = "[]" ]; then
                    echo "changed_files=$SINCE_LAST" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  INTERSECTION=$(jq -nc --argjson since "$SINCE_LAST" --argjson main "$AGAINST_MAIN" \
                    '[$since[] | select(. as $x | $main | index($x) != null)]')
                  echo "changed_files=$INTERSECTION" >> "$GITHUB_OUTPUT"

            - name: Assert T3
              uses: ./src/testing/assert
              with:
                  test-name: "partial overlap → intersection only (b.cs, c.cs)"
                  summary-file: ${{ steps.pre.outputs.summary_file }}
                  mode: exact
                  expected: '["b.cs","c.cs"]'
                  actual: ${{ steps.t3.outputs.changed_files }}

            # ── T4: No overlap → empty array ──────────────────────────────
            - name: T4 - No overlap
              id: t4
              shell: bash
              env:
                  SINCE_LAST: '["a.cs","b.cs"]'
                  AGAINST_MAIN: '["c.cs","d.cs"]'
              run: |
                  if [ -z "$AGAINST_MAIN" ] || [ "$AGAINST_MAIN" = "[]" ]; then
                    echo "changed_files=$SINCE_LAST" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  INTERSECTION=$(jq -nc --argjson since "$SINCE_LAST" --argjson main "$AGAINST_MAIN" \
                    '[$since[] | select(. as $x | $main | index($x) != null)]')
                  echo "changed_files=$INTERSECTION" >> "$GITHUB_OUTPUT"

            - name: Assert T4
              uses: ./src/testing/assert
              with:
                  test-name: "no overlap → empty array"
                  summary-file: ${{ steps.pre.outputs.summary_file }}
                  mode: exact
                  expected: "[]"
                  actual: ${{ steps.t4.outputs.changed_files }}

            - name: Print test summary
              if: always()
              shell: bash
              run: cat "${{ steps.pre.outputs.summary_file }}" || true
