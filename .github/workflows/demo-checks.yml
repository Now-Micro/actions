name: Demo - Checks Workflow

on:
    workflow_dispatch:

jobs:
    # ── Lint ──────────────────────────────────────────────────────────────
    lint:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-linting: "true"
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Coding standards – expected to FAIL ───────────────────────────────
    # Note: reusable workflow jobs do not support continue-on-error, so these
    # expected-failure cases call the composite action directly so that
    # continue-on-error can be applied at the step level.
    coding-standards-fail:
        runs-on: ubuntu-22.04
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run code standards (expected to fail)
              id: run
              continue-on-error: true
              uses: ./dotnet/coding-standards
              with:
                  directory: ./src/demo/coding-standards-fail

            - name: Assert coding standards failed
              if: ${{ steps.run.outcome != 'failure' }}
              shell: bash
              run: |
                  echo "Expected coding standards to fail on coding-standards-fail directory, but result was: ${{ steps.run.outcome }}" >&2
                  exit 1

    # ── Coding standards – expected to FAIL (explicit roslyn version) ──────
    coding-standards-fail-roslyn:
        runs-on: ubuntu-22.04
        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run code standards with roslyn version (expected to fail)
              id: run
              continue-on-error: true
              uses: ./dotnet/coding-standards
              with:
                  directory: ./src/demo/coding-standards-fail
                  roslyn-version: "4.9.2"

            - name: Assert coding standards failed with roslyn version
              if: ${{ steps.run.outcome != 'failure' }}
              shell: bash
              run: |
                  echo "Expected coding standards (roslyn 4.9.2) to fail on coding-standards-fail directory, but result was: ${{ steps.run.outcome }}" >&2
                  exit 1

    # ── Coding standards – expected to SUCCEED ────────────────────────────
    coding-standards-success:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-coding-standards: "true"
            directory: ./src/demo/coding-standards-success
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}

    # ── Tests ─────────────────────────────────────────────────────────────
    test:
        uses: ./.github/workflows/reusable-checks.yml
        with:
            enable-testing: "true"
            directory: src/demo/dotnet
            dotnet-version: "8.0.x"
            test-project-regex: '.*Tests\.csproj\s*$'
        secrets:
            token-github-packages: ${{ secrets.TOKEN_GITHUB_PACKAGES }}
