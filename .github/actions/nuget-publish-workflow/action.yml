name: Nuget Publish Workflow
description: Shared composite action for the nuget-publish workflow

inputs:
  artifact-retention-days:
    description: "Artifact retention period in days."
    required: false
    default: "1"
  cleanup-release:
    description: "Delete the created GitHub release and tag during cleanup when true."
    required: false
    default: "true"
  ci-debug-mode:
    description: "Debug mode for project discovery and publish steps."
    required: false
    default: "true"
  dry-run:
    description: "Skip creating the GitHub release when true."
    required: false
    default: "false"
  github-token:
    description: "GitHub token used for creating the GitHub release."
    required: false
    default: ""
  ignore-casing:
    description: "Ignore casing when parsing release refs and matching package names."
    required: false
    default: "true"
  nuget-names:
    description: "NuGet source names used with the configured feed URLs. Should be a comma-separated list matching nuget-urls."
    required: false
    default: "Now-Micro"
  nuget-urls:
    description: "Nuget feed URLs needed to build the projects. Should be a comma-separated list of URLs."
    required: false
    default: "https://nuget.pkg.github.com/Now-Micro/index.json"
  package:
    description: "Package name to release."
    required: false
    default: "Api"
  package-directory:
    description: "Directory to store generated package artifacts."
    required: false
    default: "nupkgs"
  ref-name:
    description: "Ref name to use when package/version are not provided."
    required: false
    default: ""
  release-dotnet-version:
    description: "The .NET version used for publishing."
    required: false
    default: "8.0.x, 10.0.x"
  release-workflow-debug-mode:
    description: "Debug mode for release validation and release publishing."
    required: false
    default: "true"
  tests-directory:
    description: "Directory to search for the test project; leave empty to skip test discovery."
    required: false
    default: "src/demo/dotnet/tests/Api.Tests"
  token-github-packages:
    description: "Token used to authenticate to GitHub Packages."
    required: false
    default: ""
  version:
    description: "Version to package. If empty a unique run id will be used."
    required: false
    default: ""

outputs:
  release-url:
    description: "URL of the created GitHub release."
    value: ${{ steps.publish-release.outputs.release-url }}
  release-name:
    description: "Release name created by the workflow."
    value: ${{ steps.publish-release.outputs.release-name }}

runs:
  using: composite
  steps:
    - name: Parse release configuration
      id: get-version
      uses: Now-Micro/actions/nuget/release/validation@v1
      with:
        debug-mode: ${{ inputs['release-workflow-debug-mode'] }}
        ignore-casing: ${{ inputs['ignore-casing'] }}
        package: ${{ inputs.package }}
        ref-name: ${{ inputs['ref-name'] != '' && inputs['ref-name'] || github.ref_name }}
        version: ${{ inputs.version }}

    - name: Find project path from package name
      id: path-finder
      uses: Now-Micro/actions/find@v1
      with:
        regex: ${{ steps.get-version.outputs.library_name }}.csproj
        ignore-casing: ${{ inputs['ignore-casing'] }}
        debug-mode: ${{ inputs['release-workflow-debug-mode'] }}

    - name: Extract Changelog
      id: extract-changelog
      uses: Now-Micro/actions/extract-changelog@v1
      with:
        library-directory: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}
        library-name: ${{ steps.get-version.outputs.library_name }}
        changelog-content-path: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}/CHANGELOG-EXTRACTED.md
        create-artifact: "false"
        version: ${{ steps.get-version.outputs.version }}

    - name: Validate outputs and changelog existence
      shell: bash
      env:
        MATCHED_DIRS_JSON: ${{ steps.path-finder.outputs.matched-dirs-absolute || '[]' }}
      run: |
        project_count=$(printf '%s' "$MATCHED_DIRS_JSON" | jq 'length')
        project_path=$(printf '%s' "$MATCHED_DIRS_JSON" | jq -r '.[0] // empty')

        if [ -z "$project_path" ]; then
          echo "No project found for package ${{ steps.get-version.outputs.library_name }}";
          exit 1;
        fi
        if [ "$project_count" -gt 1 ]; then
          echo "Multiple projects found for package ${{ steps.get-version.outputs.library_name }}:";
          printf '%s\n' "$MATCHED_DIRS_JSON" | jq .
          exit 1;
        fi
        if [ -z "${{ steps.get-version.outputs.version }}" ]; then
          echo "No version specified for release.";
          exit 1;
        fi
        if [ -z "${{ steps.get-version.outputs.library_name }}" ]; then
          echo "No library name specified for release.";
          exit 1;
        fi
        if [ "${{ inputs['dry-run'] }}" != "true" ] && [ -z "${{ inputs['github-token'] }}" ]; then  
          echo "Input 'github-token' is required when 'dry-run' is not 'true'.";  
          exit 1;  
        fi
        if [ -z "${{ steps.extract-changelog.outputs.changelog-content }}" ]; then
          echo "No changelog content found for version ${{ steps.get-version.outputs.version }}. Ensure a CHANGELOG.md exists and contains an entry for this version.";
          exit 1;
        fi

    - name: Get Project File (Main)
      id: extract-project-main
      uses: Now-Micro/actions/get-project-and-solution-files-from-directory@v1
      with:
        directory: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}
        debug-mode: ${{ inputs['ci-debug-mode'] }}
        find-project: true
        find-solution: false

    - name: Get Unique Root Directory
      id: get-root-directory
      uses:  Now-Micro/actions/get-unique-project-directories@v1
      with:
        debug-mode: ${{ inputs['ci-debug-mode'] }}
        paths: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}
        pattern: "^.*/src/.*"
        transformer: "s#^(.*?)/src/(.*)$#$1/tests#"
        throw-if-transformed-not-found: "false"

    - name: Get Project File (Test)
      id: extract-project-test
      if: ${{ inputs['tests-directory'] != '' || (steps.get-root-directory.outputs.unique_project_directories != '' && steps.get-root-directory.outputs.unique_project_directories != '[]') }}
      uses: Now-Micro/actions/get-project-and-solution-files-from-directory@v1
      with:
        debug-mode: ${{ inputs['ci-debug-mode'] }}
        directory: ${{ inputs['tests-directory'] != '' && inputs['tests-directory'] || format('{0}', fromJSON(steps.get-root-directory.outputs.unique_project_directories || '[]')[0]) }}
        find-project: true
        find-solution: false

    - name: Nuget Publish
      uses: Now-Micro/actions/nuget/publish@v1
      with:
        additional-build-args: --property WarningLevel=0 /p:Version=${{ steps.get-version.outputs.version }}
        additional-pack-args: /p:PackageVersion=${{ steps.get-version.outputs.version }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg
        dotnet-version: ${{ inputs['release-dotnet-version'] }}
        github-token: ${{ inputs['token-github-packages'] }}
        nuget-names: ${{ inputs['nuget-names'] }}
        nuget-passwords: ${{ inputs['token-github-packages'] }}
        nuget-urls: ${{ inputs['nuget-urls'] }}
        nuget-usernames: ${{ github.actor }}
        project-file: ${{ steps.extract-project-main.outputs.project-found }}
        package-directory: ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}
        test-project-file: ${{ steps.extract-project-test.outputs.project-found || '' }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.get-version.outputs.library_name }}-${{ steps.get-version.outputs.version }}
        path: |
          ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}/*.nupkg
          ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}/*.snupkg
          ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}/*.symbols.nupkg
        if-no-files-found: error
        retention-days: ${{ inputs['artifact-retention-days'] }}

    - name: Publish GitHub Release
      id: publish-release
      if: ${{ inputs['dry-run'] != 'true' }}
      uses: Now-Micro/actions/github/release@v1
      with:
        artifact-name: ${{ steps.get-version.outputs.library_name }}-${{ steps.get-version.outputs.version }}
        artifacts-path: ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}
        changelog-path: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}/CHANGELOG.md
        debug-mode: ${{ inputs['release-workflow-debug-mode'] }}
        github-token: ${{ inputs['github-token'] }}
        library-name: ${{ steps.get-version.outputs.library_name }}
        release-version: ${{ steps.get-version.outputs.version }}

    - name: Delete GitHub Release
      if: ${{ always() && inputs['cleanup-release'] == 'true' && inputs['dry-run'] != 'true' && steps.publish-release.outputs.release-url != '' }}
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs['github-token'] }}
        script: |
          const tag = `${{ steps.publish-release.outputs.tag-name }}`;
          const { owner, repo } = context.repo;
          try {
            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
            core.info(`Deleted GitHub release for tag ${tag}`);
          } catch (error) {
            if (error.status === 404) {
              core.info(`GitHub release for tag ${tag} was already deleted`);
            } else {
              throw error;
            }
          }

          try {
            await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
            core.info(`Deleted Git tag ref ${tag}`);
          } catch (error) {
            if (error.status === 404) {
              core.info(`Git tag ref ${tag} was already deleted`);
            } else {
              throw error;
            }
          }

    - name: Delete published NuGet package version
      if: ${{ always() && inputs['cleanup-release'] == 'true' && inputs['dry-run'] != 'true' && steps.publish-release.outputs.release-url != '' }}
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs['token-github-packages'] }}
        script: |
          const packageName = '${{ steps.get-version.outputs.library_name }}';
          const versionNumber = '${{ steps.get-version.outputs.version }}';
          const org = context.repo.owner;

          core.info(`🔍 Looking for package '${packageName}' version '${versionNumber}' in org '${org}'`);

          let versions;
          try {
            const resp = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              org,
              package_type: 'nuget',
              package_name: packageName,
            });
            versions = resp.data;
          } catch (err) {
            core.warning(`Could not list package versions: ${err.message}`);
            return;
          }

          const match = versions.find(v => v.name === versionNumber);
          if (!match) {
            core.info(`ℹ️ Version '${versionNumber}' not found in package '${packageName}' — nothing to delete.`);
            return;
          }

          try {
            await github.rest.packages.deletePackageVersionForOrg({
              org,
              package_type: 'nuget',
              package_name: packageName,
              package_version_id: match.id,
            });
            core.info(`✅ Deleted NuGet package version: ${packageName}@${versionNumber}`);
          } catch (err) {
            core.warning(`Failed to delete package version: ${err.message}`);
          }
