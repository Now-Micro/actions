name: Demo - Nuget Publish Workflow
description: Demo for the nuget-publish workflow using a composite action

inputs:
  artifact-retention-days:
    description: "Artifact retention period in days."
    required: false
    default: "1"
  ci-debug-mode:
    description: "Debug mode for project discovery and publish steps."
    required: false
    default: "true"
  ignore-casing:
    description: "Ignore casing when parsing release refs and matching package names."
    required: false
    default: "true"
  package:
    description: "Package name to release."
    required: false
    default: "Api"
  package-directory:
    description: "Directory to store generated package artifacts."
    required: false
    default: "nupkgs"
  ref-name:
    description: "Ref name to use when package/version are not provided."
    required: false
    default: ""
  release-dotnet-version:
    description: "The .NET version used for publishing."
    required: false
    default: "8.0.x, 10.0.x"
  release-workflow-debug-mode:
    description: "Debug mode for release validation and release publishing."
    required: false
    default: "true"
  tests-directory:
    description: "Directory to search for the test project; leave empty to skip test discovery."
    required: false
    default: "src/demo/dotnet/tests/Api.Tests"
  version:
    description: "Version to package. If empty a unique run id will be used."
    required: false
    default: ""
  dry-run:
    description: "Skip creating the GitHub release when true."
    required: false
    default: "false"
  github-token:
    description: "GitHub token used for creating the GitHub release."
    required: false
    default: ""
  token-github-packages:
    description: "Token used to authenticate to GitHub Packages."
    required: false
    default: ""

outputs:
  release-url:
    description: "URL of the created GitHub release."
    value: ${{ steps.publish-release.outputs.release-url }}
  release-name:
    description: "Release name created by the workflow."
    value: ${{ steps.publish-release.outputs.release-name }}

runs:
  using: composite
  steps:
    - name: Parse release configuration
      id: get-version
      uses: Now-Micro/actions/nuget/release/validation@v1
      with:
        debug-mode: ${{ inputs['release-workflow-debug-mode'] }}
        ignore-casing: ${{ inputs['ignore-casing'] }}
        package: ${{ inputs.package }}
        ref-name: ${{ inputs['ref-name'] != '' && inputs['ref-name'] || github.ref_name }}
        version: ${{ inputs.version }}

    - name: Find project path from package name
      id: path-finder
      uses: Now-Micro/actions/find@v1
      with:
        regex: ${{ steps.get-version.outputs.library_name }}.csproj
        ignore-casing: ${{ inputs['ignore-casing'] }}
        debug-mode: ${{ inputs['release-workflow-debug-mode'] }}

    - name: Validate outputs
      shell: bash
      run: |
        if [ -z "${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}" ]; then
          echo "No project found for package ${{ steps.get-version.outputs.library_name }}";
          exit 1;
        fi
        if [ $(echo "${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]') }}" | jq length) -gt 1 ]; then
          echo "Multiple projects found for package ${{ steps.get-version.outputs.library_name }}:";
          echo "${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]') }}";
          exit 1;
        fi
        if [ -z "${{ steps.get-version.outputs.version }}" ]; then
          echo "No version specified for release.";
          exit 1;
        fi
        if [ -z "${{ steps.get-version.outputs.library_name }}" ]; then
          echo "No library name specified for release.";
          exit 1;
        fi

    - name: Get Project File (Main)
      id: extract-project-main
      uses: Now-Micro/actions/get-project-and-solution-files-from-directory@v1
      with:
        directory: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}
        debug-mode: ${{ inputs['ci-debug-mode'] }}
        find-project: true
        find-solution: false

    - name: Get Project File (Test)
      id: extract-project-test
      if: ${{ inputs['tests-directory'] != '' }}
      uses: Now-Micro/actions/get-project-and-solution-files-from-directory@v1
      with:
        directory: ${{ inputs['tests-directory'] }}
        debug-mode: ${{ inputs['ci-debug-mode'] }}
        find-project: true
        find-solution: false

    - name: Nuget Publish
      uses: Now-Micro/actions/nuget/publish@v1
      with:
        additional-build-args: --property WarningLevel=0 /p:Version=${{ steps.get-version.outputs.version }}
        additional-pack-args: /p:PackageVersion=${{ steps.get-version.outputs.version }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg
        dotnet-version: ${{ inputs['release-dotnet-version'] }}
        github-token: ${{ inputs['token-github-packages'] }}
        nuget-names: "github"
        nuget-passwords: ${{ inputs['token-github-packages'] }}
        nuget-urls: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
        nuget-usernames: ${{ github.actor }}
        project-file: ${{ steps.extract-project-main.outputs.project-found }}
        package-directory: ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}
        test-project-file: ${{ inputs['tests-directory'] != '' && steps.extract-project-test.outputs.project-found || '' }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.get-version.outputs.library_name }}-${{ steps.get-version.outputs.version }}
        path: |
          ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}/*.nupkg
          ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}/*.snupkg
          ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}/*.symbols.nupkg
        if-no-files-found: error
        retention-days: ${{ inputs['artifact-retention-days'] }}

    - name: Publish GitHub Release
      id: publish-release
      if: ${{ inputs['dry-run'] != 'true' }}
      uses: Now-Micro/actions/github/release@v1
      with:
        artifact-name: ${{ steps.get-version.outputs.library_name }}-${{ steps.get-version.outputs.version }}
        artifacts-path: ${{ inputs['package-directory'] != '' && inputs['package-directory'] || 'nupkgs' }}
        changelog-path: ${{ fromJSON(steps.path-finder.outputs.matched-dirs-absolute || '[]')[0] }}/CHANGELOG.md
        debug-mode: ${{ inputs['release-workflow-debug-mode'] }}
        github-token: ${{ inputs['github-token'] }}
        library-name: ${{ steps.get-version.outputs.library_name }}
        release-version: ${{ steps.get-version.outputs.version }}

    - name: Delete GitHub Release
      if: ${{ always() && inputs['dry-run'] != 'true' && steps.publish-release.outputs.release-url != '' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs['github-token'] }}
        script: |
          const tag = `${{ steps.publish-release.outputs.tag-name }}`;
          const { owner, repo } = context.repo;
          const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
          await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
          core.info(`Deleted GitHub release for tag ${tag}`);
