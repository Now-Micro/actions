name: Pre-Release - Publish NuGet Packages
description: "Reusable workflow to publish pre-release NuGet packages. This workflow is intended to be called by other workflows that know which directory to pass in."

inputs:
  artifact-retention-days:
    description: "Artifact retention period in days."
    required: false
    default: "1"
  base-ref:
    description: "Base ref to compare changes against for determining which packages
      to publish."
    required: true
  ci-debug-mode:
    description: "Debug mode for project discovery and publish steps."
    required: false
    default: "false"
  directory:
    description: "Directory to check for changes and publish packages from."
    required: true
  dotnet-version:
    description: "The versions of .NET to install before running this workflow.
      Should be a comma-separated list of versions (e.g. '8.0.x,10.0.x')."
    required: false
    default: "8.0.x"
  nuget-names:
    description: "NuGet source names used with the configured feed URLs. Should be a comma-separated list matching nuget-urls."
    required: false
    default: "Now-Micro"
  nuget-package-dir:
    description: "Directory to store generated package artifacts."
    required: false
    default: "nupkgs"
  nuget-pattern-to-match:
    description: "Glob pattern to match for determining which changed files should
      trigger a package publish. Should include a capture group for the project
      directory (e.g. '^(.*/src)/.*\\.(cs|csproj|sln)$')."
    required: false
    default: "^(.*/src)/.*\\.(cs|csproj|sln)$"
  nuget-project-regex:
    description: "Regex pattern to extract project name from the .csproj file path.
      Should include a capture group for the project name (e.g.
      '.*\\.csproj$')."
    required: false
    default: ".*\\.csproj$"
  nuget-urls:
    description: "Nuget feed URLs needed to build the projects.  Should be a comma-separated list of URLs."
    required: false
    default: "https://nuget.pkg.github.com/Now-Micro/index.json"
  prerelease-identifier:
    description: "Pre-release identifier (alpha, beta, preview, rc)"
    required: false
    default: "alpha"
  token-github-packages:
    description: "PAT used to authenticate to GitHub Packages."
    required: true
  version-increment-type:
    description: "Version increment type (major, minor, patch, or none)"
    required: false
    default: "none"

outputs:
  version-number:
    description: "The full pre-release version number that was published (e.g. 1.2.3-alpha-202505051430)."
    value: ${{ steps.calc-version.outputs.version-number }}
  package-name:
    description: "The NuGet package name that was published."
    value: ${{ steps.pkg-name.outputs.package-name }}

runs:
  using: "composite"
  steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Derive top-level dir
      shell: bash
      id: lib
      run: |
        p="${{ inputs.directory }}"
        p="${p//\\//}"           # normalize backslashes -> slashes
        root="${p%%/*}"          # take text before first '/'
        echo "project-found=${{ inputs.directory }}" >> $GITHUB_OUTPUT
        echo "root: $root"
        echo "root=$root" >> $GITHUB_OUTPUT

    - name: Compute directory slug
      shell: bash
      id: slug
      run: |
        d="${{ inputs.directory }}"
        d="${d//\\//}"         # normalize backslashes -> slashes
        slug="${d//\//-}"       # replace '/' with '-'
        # basic whitespace to dash as extra safety
        slug="$(echo "$slug" | tr ' ' '-')"
        echo "dir_slug=$slug" >> $GITHUB_OUTPUT

    - name: Get Project File
      id: extract-project
      uses: Now-Micro/actions/get-project-and-solution-files-from-directory@v1
      with:
        directory: ${{ inputs.directory }}
        debug-mode: ${{ inputs.ci-debug-mode }}
        find-project: true
        find-solution: false
        project-regex: ${{ inputs.nuget-project-regex }}

    - name: Derive package name
      id: pkg-name
      shell: bash
      run: |
        name="${{ steps.extract-project.outputs.project-name }}"
        name="${name%.csproj}"
        echo "package-name=$name" >> "$GITHUB_OUTPUT"

    - name: Calculate pre-release version
      id: calc-version
      uses: Now-Micro/actions/generate-version@v1
      with:
        infix-value: ${{ inputs.prerelease-identifier }}
        release-keyword: ${{ steps.lib.outputs.root }}
        project-file: ${{ steps.extract-project.outputs.project-found }}
        increment-type: ${{ inputs.version-increment-type }}

    - name: Nuget Publish
      uses: Now-Micro/actions/nuget/publish@v1
      with:
        additional-build-args: --property WarningLevel=0 /p:VersionSuffix=${{
          steps.calc-version.outputs.version-number }}
        additional-pack-args: /p:VersionSuffix=${{
          steps.calc-version.outputs.version-number }} /p:PackageVersion=${{
          steps.calc-version.outputs.version-number }} -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg
        dotnet-version: ${{ inputs.dotnet-version }}
        github-token: ${{ inputs.token-github-packages }}
        nuget-names: ${{ inputs['nuget-names'] }}
        nuget-passwords: ${{ inputs.token-github-packages }}
        nuget-urls: ${{ inputs.nuget-urls }}
        nuget-usernames: ${{ github.actor }}
        project-file: ${{ steps.extract-project.outputs.project-found }}
        package-directory: ${{ inputs.directory }}/${{ inputs.nuget-package-dir }}

    - name: Upload pre-release artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.pkg-name.outputs.package-name }}-${{
          steps.calc-version.outputs.version-number }}-${{
          steps.slug.outputs.dir_slug }}
        path: |
          ${{ inputs.directory }}/${{ inputs.nuget-package-dir }}/*.nupkg
          ${{ inputs.directory }}/${{ inputs.nuget-package-dir }}/*.snupkg
          ${{ inputs.directory }}/${{ inputs.nuget-package-dir }}/*.symbols.nupkg
        retention-days: ${{ inputs.artifact-retention-days }}
