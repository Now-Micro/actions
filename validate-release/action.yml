name: "Validate Release"
description: "Parses release inputs or branch names, validates the semantic version, and resolves the project directory."
author: "Trafera"

inputs:
  debug-mode:
    description: "Enable verbose debug logging."
    required: false
    default: "false"
  package:
    description: "Library/package name. This is required when using workflow_dispatch or workflow_call with explicit package inputs."
    required: false
    default: ""
  version:
    description: "Semantic version (X.Y.Z or prerelease). This is required when using workflow_dispatch or workflow_call with explicit package inputs."
    required: false
    default: ""
  ref-name:
    description: "Ref name to parse when package/version inputs are not supplied."
    required: false
    default: ""
  working-directory:
    description: "Directory to search for the matching project file."
    required: false
    default: "."

outputs:
  version:
    description: "Parsed semantic version."
    value: ${{ steps.validate.outputs.version }}
  library_name:
    description: "Parsed library/package name."
    value: ${{ steps.validate.outputs.library_name }}
  path_to_project:
    description: "Absolute project directory containing the matched .csproj file."
    value: ${{ steps.validate.outputs.path_to_project }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: Now-Micro/actions/setup-node@v1

    - name: Validate release configuration
      id: validate
      shell: bash
      run: node "$GITHUB_ACTION_PATH/validate-release.js"
      env:
        INPUT_DEBUG_MODE: ${{ inputs.debug-mode }}
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_REF_NAME: ${{ inputs.ref-name }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
